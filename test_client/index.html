<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deep Trip - Voice Test Client</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 480px;
      width: 100%;
      padding: 2rem;
    }
    h1 {
      text-align: center;
      margin-bottom: 0.5rem;
      font-size: 1.8rem;
    }
    .subtitle {
      text-align: center;
      color: #888;
      margin-bottom: 2rem;
      font-size: 0.9rem;
    }
    .status {
      text-align: center;
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      font-weight: 500;
    }
    .status.disconnected { background: #2d2d3d; color: #888; }
    .status.connecting { background: #2d2d1d; color: #f0c040; }
    .status.connected { background: #1d2d1d; color: #4caf50; }
    .status.error { background: #2d1d1d; color: #f44336; }

    .btn {
      display: block;
      width: 100%;
      padding: 1rem;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 1rem;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-join {
      background: #4caf50;
      color: white;
    }
    .btn-join:hover:not(:disabled) { background: #45a049; }
    .btn-leave {
      background: #f44336;
      color: white;
    }
    .btn-leave:hover:not(:disabled) { background: #d32f2f; }
    .btn-mute {
      background: #ff9800;
      color: white;
    }
    .btn-mute:hover:not(:disabled) { background: #f57c00; }
    .btn-mute.muted {
      background: #666;
    }

    .controls { display: none; }
    .controls.active { display: block; }

    .volume-meter {
      margin: 1rem 0;
      text-align: center;
    }
    .volume-bar {
      height: 8px;
      background: #333;
      border-radius: 4px;
      overflow: hidden;
      margin-top: 0.5rem;
    }
    .volume-fill {
      height: 100%;
      background: #4caf50;
      border-radius: 4px;
      transition: width 0.1s;
      width: 0%;
    }
    .volume-label {
      font-size: 0.8rem;
      color: #888;
    }

    /* --- Agent Status Indicator --- */
    .agent-status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      background: #2d2d3d;
      margin-bottom: 1.5rem;
    }
    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #666;
      flex-shrink: 0;
    }
    .status-dot.idle { background: #666; }
    .status-dot.listening {
      background: #4caf50;
      animation: pulse 1.5s ease-in-out infinite;
    }
    .status-dot.speaking {
      background: #ff9800;
      animation: pulse 0.8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 currentColor; }
      50% { opacity: 0.7; box-shadow: 0 0 8px 4px currentColor; }
    }
    .status-dot.listening { color: #4caf50; }
    .status-dot.speaking { color: #ff9800; }
    .agent-status-text {
      font-size: 0.9rem;
      font-weight: 500;
      color: #aaa;
    }

    /* --- Location Panel --- */
    .location-panel {
      background: #2d2d3d;
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 1.5rem;
    }
    .location-panel h3 {
      font-size: 0.9rem;
      color: #4fc3f7;
      margin-bottom: 0.75rem;
    }
    .location-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }
    .location-row select,
    .location-row button {
      border-radius: 6px;
      border: 1px solid #444;
      background: #1a1a2e;
      color: #eee;
      padding: 0.5rem 0.75rem;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .location-row select { flex: 1; }
    .location-row button {
      white-space: nowrap;
      background: #4fc3f7;
      color: #111;
      border: none;
      font-weight: 600;
    }
    .location-row button:hover { background: #39aed9; }
    .location-coords {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.8rem;
      color: #4fc3f7;
      background: #111;
      border-radius: 6px;
      padding: 0.5rem 0.75rem;
      text-align: center;
    }

    /* --- Conversation Transcript --- */
    .transcript {
      margin-top: 1.5rem;
      background: #111;
      border-radius: 8px;
      padding: 1rem;
      max-height: 220px;
      overflow-y: auto;
    }
    .transcript h3 {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 0.75rem;
    }
    .transcript-entry {
      padding: 0.5rem 0.75rem;
      margin-bottom: 0.5rem;
      border-radius: 6px;
      font-size: 0.8rem;
      line-height: 1.4;
      background: #1a1a2e;
    }
    .transcript-entry.user {
      border-left: 3px solid #4fc3f7;
    }
    .transcript-entry.agent {
      border-left: 3px solid #4caf50;
    }
    .transcript-role {
      font-weight: 600;
      font-size: 0.7rem;
      text-transform: uppercase;
      margin-bottom: 0.2rem;
    }
    .transcript-entry.user .transcript-role { color: #4fc3f7; }
    .transcript-entry.agent .transcript-role { color: #4caf50; }
    .transcript-text { color: #ccc; }
    .transcript-time {
      font-size: 0.65rem;
      color: #555;
      margin-top: 0.2rem;
    }

    .log {
      margin-top: 1.5rem;
      background: #111;
      border-radius: 8px;
      padding: 1rem;
      max-height: 200px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 0.75rem;
      line-height: 1.5;
    }
    .log-entry { color: #888; }
    .log-entry.info { color: #4fc3f7; }
    .log-entry.success { color: #4caf50; }
    .log-entry.error { color: #f44336; }
    .log-entry.warn { color: #ff9800; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Deep Trip</h1>
    <p class="subtitle">Voice Guide Test Client</p>

    <div id="status" class="status disconnected">Disconnected</div>

    <div id="join-section">
      <button id="btn-join" class="btn btn-join" onclick="joinChannel()">
        Join Channel
      </button>
    </div>

    <div id="controls" class="controls">
      <button id="btn-mute" class="btn btn-mute" onclick="toggleMute()">
        Mute Microphone
      </button>
      <div class="volume-meter">
        <span class="volume-label">Your Microphone</span>
        <div class="volume-bar"><div id="local-vol" class="volume-fill"></div></div>
      </div>
      <div class="volume-meter">
        <span class="volume-label">Agent Audio</span>
        <div class="volume-bar"><div id="remote-vol" class="volume-fill"></div></div>
      </div>
      <button id="btn-leave" class="btn btn-leave" onclick="leaveChannel()">
        Leave Channel
      </button>
    </div>

    <!-- Agent Status Indicator -->
    <div id="agent-status" class="agent-status" style="display:none;">
      <div id="status-dot" class="status-dot idle"></div>
      <span id="agent-status-text" class="agent-status-text">Agent Idle</span>
    </div>

    <!-- Location Panel -->
    <div id="location-panel" class="location-panel" style="display:none;">
      <h3>Location</h3>
      <div class="location-row">
        <select id="location-preset" onchange="applyPresetLocation()">
          <option value="">-- Select preset --</option>
          <option value="35.7148,139.7967">Senso-ji Temple</option>
          <option value="35.6580,139.7016">Shibuya Crossing</option>
          <option value="35.6764,139.6993">Meiji Jingu Shrine</option>
          <option value="35.6586,139.7454">Tokyo Tower</option>
          <option value="35.6654,139.7707">Tsukiji Market</option>
          <option value="35.7146,139.7734">Ueno Park</option>
          <option value="35.7023,139.7745">Akihabara</option>
          <option value="35.6812,139.7671">Tokyo Station</option>
        </select>
        <button onclick="startGPS()">GPS</button>
      </div>
      <div id="location-coords" class="location-coords">No location set</div>
    </div>

    <!-- Conversation Transcript -->
    <div id="transcript" class="transcript" style="display:none;">
      <h3>Conversation</h3>
      <div id="transcript-entries"></div>
    </div>

    <div id="log" class="log"></div>
  </div>

  <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.22.0.js"></script>
  <script>
    const APP_ID = '371a0ec85abf406698db695f32423e9c';
    const CHANNEL = 'deep_trip_demo';
    const UID = 123;
    const TOKEN_URL = '/token';  // relative URL, works with HTTPS

    let client = null;
    let localAudioTrack = null;
    let isMuted = false;
    let volumeInterval = null;

    function log(msg, level = '') {
      const el = document.getElementById('log');
      const entry = document.createElement('div');
      entry.className = 'log-entry ' + level;
      const ts = new Date().toLocaleTimeString();
      entry.textContent = `[${ts}] ${msg}`;
      el.appendChild(entry);
      el.scrollTop = el.scrollHeight;
      console.log(`[${level || 'log'}] ${msg}`);
    }

    function setStatus(text, cls) {
      const el = document.getElementById('status');
      el.textContent = text;
      el.className = 'status ' + cls;
    }

    async function fetchToken() {
      try {
        const res = await fetch(`${TOKEN_URL}?channel=${CHANNEL}&uid=${UID}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        return data.token;
      } catch (e) {
        log('Token server not available, trying without token', 'warn');
        return null;
      }
    }

    async function joinChannel() {
      try {
        document.getElementById('btn-join').disabled = true;
        setStatus('Connecting...', 'connecting');
        log('Creating Agora client...', 'info');

        client = AgoraRTC.createClient({ mode: 'rtc', codec: 'vp8' });

        client.on('user-published', async (user, mediaType) => {
          log(`Agent published ${mediaType} (uid: ${user.uid})`, 'info');
          await client.subscribe(user, mediaType);
          log(`Subscribed to agent ${mediaType}`, 'success');
          if (mediaType === 'audio') {
            user.audioTrack.play();
            log('Playing agent audio', 'success');
          }
        });

        client.on('user-unpublished', (user, mediaType) => {
          log(`Agent unpublished ${mediaType}`, 'warn');
        });

        client.on('user-joined', (user) => {
          log(`User ${user.uid} joined channel`, 'info');
        });

        client.on('user-left', (user) => {
          log(`User ${user.uid} left channel`, 'warn');
        });

        client.on('connection-state-change', (cur, prev) => {
          log(`Connection: ${prev} -> ${cur}`, 'info');
        });

        const token = await fetchToken();
        log(`Joining channel "${CHANNEL}" as UID ${UID}...`, 'info');
        await client.join(APP_ID, CHANNEL, token, UID);
        log('Joined channel successfully', 'success');

        log('Creating microphone track...', 'info');
        localAudioTrack = await AgoraRTC.createMicrophoneAudioTrack();
        await client.publish([localAudioTrack]);
        log('Microphone published', 'success');

        setStatus('Connected - Speak to the guide!', 'connected');
        document.getElementById('join-section').style.display = 'none';
        document.getElementById('controls').classList.add('active');
        document.getElementById('agent-status').style.display = 'flex';
        document.getElementById('location-panel').style.display = 'block';
        document.getElementById('transcript').style.display = 'block';

        // Volume monitoring + agent status detection + mock transcript
        volumeInterval = setInterval(() => {
          let localVol = 0;
          if (localAudioTrack) {
            localVol = localAudioTrack.getVolumeLevel() * 100;
            document.getElementById('local-vol').style.width = localVol + '%';
          }
          const remoteUsers = client.remoteUsers;
          let maxRemoteVol = 0;
          remoteUsers.forEach(user => {
            if (user.audioTrack) {
              const vol = user.audioTrack.getVolumeLevel() * 100;
              if (vol > maxRemoteVol) maxRemoteVol = vol;
            }
          });
          document.getElementById('remote-vol').style.width = maxRemoteVol + '%';

          // Agent status detection
          if (maxRemoteVol > SPEAKING_THRESHOLD) {
            setAgentStatus('speaking');
          } else if (localVol > LISTENING_THRESHOLD) {
            setAgentStatus('listening');
          } else {
            setAgentStatus('idle');
          }

          // Mock transcript: detect user speaking bursts
          if (localVol > LISTENING_THRESHOLD) {
            if (!userSpeakingTimer) {
              userSpeakingTimer = setTimeout(() => {
                addTranscript('user', MOCK_USER_PHRASES[mockUserIdx % MOCK_USER_PHRASES.length]);
                mockUserIdx++;
                userSpeakingTimer = null;
              }, 2000);
            }
          } else if (userSpeakingTimer) {
            clearTimeout(userSpeakingTimer);
            userSpeakingTimer = null;
          }

          // Mock transcript: detect agent speaking bursts
          if (maxRemoteVol > SPEAKING_THRESHOLD) {
            if (!agentSpeakingTimer) {
              agentSpeakingTimer = setTimeout(() => {
                addTranscript('agent', MOCK_AGENT_PHRASES[mockAgentIdx % MOCK_AGENT_PHRASES.length]);
                mockAgentIdx++;
                agentSpeakingTimer = null;
              }, 2000);
            }
          } else if (agentSpeakingTimer) {
            clearTimeout(agentSpeakingTimer);
            agentSpeakingTimer = null;
          }
        }, 100);

      } catch (err) {
        log(`Error: ${err.message}`, 'error');
        setStatus('Connection failed', 'error');
        document.getElementById('btn-join').disabled = false;
      }
    }

    function toggleMute() {
      if (!localAudioTrack) return;
      isMuted = !isMuted;
      localAudioTrack.setEnabled(!isMuted);
      const btn = document.getElementById('btn-mute');
      btn.textContent = isMuted ? 'Unmute Microphone' : 'Mute Microphone';
      btn.classList.toggle('muted', isMuted);
      log(isMuted ? 'Microphone muted' : 'Microphone unmuted', 'info');
    }

    async function leaveChannel() {
      try {
        if (volumeInterval) clearInterval(volumeInterval);
        if (localAudioTrack) {
          localAudioTrack.close();
          localAudioTrack = null;
        }
        if (client) {
          await client.leave();
          client = null;
        }
        log('Left channel', 'info');
        setStatus('Disconnected', 'disconnected');
        document.getElementById('join-section').style.display = 'block';
        document.getElementById('btn-join').disabled = false;
        document.getElementById('controls').classList.remove('active');
        document.getElementById('agent-status').style.display = 'none';
        document.getElementById('location-panel').style.display = 'none';
        document.getElementById('transcript').style.display = 'none';
        setAgentStatus('idle');
        isMuted = false;
      } catch (err) {
        log(`Error leaving: ${err.message}`, 'error');
      }
    }

    // --- Agent Status ---
    let currentAgentStatus = 'idle';
    const SPEAKING_THRESHOLD = 8;
    const LISTENING_THRESHOLD = 5;

    function setAgentStatus(status) {
      if (status === currentAgentStatus) return;
      currentAgentStatus = status;
      const dot = document.getElementById('status-dot');
      const text = document.getElementById('agent-status-text');
      dot.className = 'status-dot ' + status;
      const labels = { idle: 'Agent Idle', listening: 'Agent Listening', speaking: 'Agent Speaking' };
      text.textContent = labels[status] || 'Agent Idle';
    }

    // --- Location ---
    let currentLat = null;
    let currentLng = null;
    let gpsWatchId = null;

    function updateLocationDisplay(lat, lng) {
      currentLat = lat;
      currentLng = lng;
      document.getElementById('location-coords').textContent =
        `${lat.toFixed(4)}°N, ${lng.toFixed(4)}°E`;
    }

    function sendLocationToAgent(lat, lng) {
      if (!client) return;
      try {
        const msg = JSON.stringify({ cmd: 'update_location', lat, lng });
        client.sendStreamMessage(new TextEncoder().encode(msg));
        log(`Location sent: ${lat.toFixed(4)}, ${lng.toFixed(4)}`, 'info');
      } catch (e) {
        log(`Failed to send location: ${e.message}`, 'warn');
      }
    }

    function applyPresetLocation() {
      const sel = document.getElementById('location-preset');
      if (!sel.value) return;
      const [lat, lng] = sel.value.split(',').map(Number);
      updateLocationDisplay(lat, lng);
      sendLocationToAgent(lat, lng);
      log(`Preset location: ${sel.options[sel.selectedIndex].text}`, 'info');
    }

    function startGPS() {
      if (!navigator.geolocation) {
        log('Geolocation not supported', 'error');
        return;
      }
      if (gpsWatchId !== null) {
        navigator.geolocation.clearWatch(gpsWatchId);
        gpsWatchId = null;
        log('GPS tracking stopped', 'info');
        return;
      }
      log('Starting GPS tracking...', 'info');
      gpsWatchId = navigator.geolocation.watchPosition(
        (pos) => {
          const { latitude, longitude } = pos.coords;
          updateLocationDisplay(latitude, longitude);
          sendLocationToAgent(latitude, longitude);
          document.getElementById('location-preset').value = '';
        },
        (err) => {
          log(`GPS error: ${err.message}`, 'error');
        },
        { enableHighAccuracy: true, maximumAge: 5000 }
      );
    }

    // --- Transcript ---
    const MOCK_USER_PHRASES = [
      'What is this place?',
      'Tell me about the history here.',
      'Where should I go next?',
      'What can I see nearby?',
    ];
    const MOCK_AGENT_PHRASES = [
      'This area has a rich cultural heritage dating back centuries.',
      'I recommend heading north to explore the shrine grounds.',
      'There are several notable landmarks within walking distance.',
      'The architecture here reflects traditional Edo-period design.',
    ];
    let mockUserIdx = 0;
    let mockAgentIdx = 0;
    let userSpeakingTimer = null;
    let agentSpeakingTimer = null;

    function addTranscript(role, text) {
      const container = document.getElementById('transcript-entries');
      const entry = document.createElement('div');
      entry.className = 'transcript-entry ' + role;
      const ts = new Date().toLocaleTimeString();
      entry.innerHTML =
        `<div class="transcript-role">${role === 'user' ? 'You' : 'Guide'}</div>` +
        `<div class="transcript-text">${text}</div>` +
        `<div class="transcript-time">${ts}</div>`;
      container.appendChild(entry);
      const panel = document.getElementById('transcript');
      panel.scrollTop = panel.scrollHeight;
    }
  </script>
</body>
</html>
